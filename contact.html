<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — Avtandil PETROSYAN</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="include-html.js" defer></script>
  <script src="main.js" defer></script>
</head>
<body>
  <div data-include="includes/header.html"></div>
  <main class="container">
    <section class="card reveal">
      <h1>Contact</h1>
      <p>Intéressé par une collaboration ou une alternance ? Contactez-moi directement !</p>
    </section>

    <section class="card reveal">
      <form class="contact-form" id="contact-form">
        <div>
          <label for="name">Nom complet</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required>
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="votre@email.com" required>
        </div>
        <div>
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" placeholder="Votre message..." required></textarea>
        </div>
        <button type="submit" class="btn primary">Envoyer</button>
      </form>
    </section>

    <section class="card reveal">
      <h2>Infos pratiques</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px">
        <div>
          <h3 style="font-size:14px;color:#888;margin-bottom:8px">Email</h3>
          <p><a href="mailto:petrosyan21000@gmail.com" style="color:#0b6ef6">petrosyan21000@gmail.com</a></p>
        </div>
        <div>
          <h3 style="font-size:14px;color:#888;margin-bottom:8px">Localisation</h3>
          <p>Dijon, 21000<br>France</p>
        </div>
        <div>
          <h3 style="font-size:14px;color:#888;margin-bottom:8px">Permis</h3>
          <p>Permis B</p>
        </div>
        <div>
          <h3 style="font-size:14px;color:#888;margin-bottom:8px">Recherche</h3>
          <p>Alternance BUT 2 & 3</p>
        </div>
      </div>
    </section>
  </main>
  <div data-include="includes/footer.html"></div>
</body>
</html>
